<!DOCTYPE html>
<html>
<head>
    <title>Install Pro Fixture Console</title>
    <meta charset="utf-8">
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding: 50px; }
        h1 { color: #00d2ff; }
    </style>
</head>
<body>
    <h1>Flash the ESP32-C3</h1>
    <p>Connect your ESP32 via USB and click the button below to install the firmware directly from your browser.</p>
    <br>
    
    <script type="module" src="https://unpkg.com/esp-web-tools@8.0.1/dist/web/install-button.js?module"></script>
    <esp-web-install-button manifest="firmware/manifest.json"></esp-web-install-button>
    
    <br><br>
    <p style="color: #aaa; font-size: 0.8em;">Note: Works only in Chrome, Edge, and Opera.</p>
</body>
</html>
